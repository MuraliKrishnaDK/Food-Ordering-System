spring.jpa.hibernate.ddl-auto=none
spring.jpa.database-platform=org.hibernate.dialect.MySQL5Dialect
AES.Key=Bar12345Bar12345
fileStorage=/assets

# Server port — Railway injects PORT automatically
server.port=${PORT:8080}

# Database — uses Railway MySQL env vars when deployed, falls back to local
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/myusers?useSSL=false&serverTimezone=UTC}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
