spring.jpa.hibernate.ddl-auto=none
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
AES.Key=Bar12345Bar12345
fileStorage=/assets

# Server port — Railway injects PORT automatically
server.port=${PORT:8080}

# Database — uses Railway PostgreSQL env vars when deployed, falls back to local
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/myusers}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
